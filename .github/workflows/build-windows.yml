name: Build Windows Application

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Publish Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Windows x64 dependencies
        run: dotnet restore TaikoSoundEditor.csproj --runtime win-x64

      - name: Publish single-file application
        shell: pwsh
        run: |
          dotnet publish TaikoSoundEditor.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output artifacts/publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Verify clean publish output
        shell: pwsh
        run: |
          $publish = Join-Path $PWD "artifacts/publish"
          $exe = Join-Path $publish "TaikoSoundEditor.exe"
          if (-not (Test-Path $exe)) {
            throw "Published executable was not created: $exe"
          }

          $looseDlls = Get-ChildItem $publish -File -Filter "*.dll"
          if ($looseDlls.Count -gt 0) {
            $names = ($looseDlls.Name -join ", ")
            throw "Single-file publish left loose DLLs beside the executable: $names"
          }

          Write-Host "Published files:"
          Get-ChildItem $publish | Select-Object Name, Length

      - name: Upload runnable application
        uses: actions/upload-artifact@v4
        with:
          name: TaikoSoundEditor-win-x64
          path: artifacts/publish
          if-no-files-found: error
          retention-days: 30

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $zip = Join-Path $PWD "artifacts/TaikoSoundEditor-win-x64.zip"
          Compress-Archive -Path "artifacts/publish/*" -DestinationPath $zip -CompressionLevel Optimal -Force

      - name: Attach ZIP to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/TaikoSoundEditor-win-x64.zip
          generate_release_notes: true
