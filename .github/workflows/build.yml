name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Remove obsolete remoting import
        shell: pwsh
        run: |
          $path = 'Commons/Controls/MusicOrderViewer.cs'
          $content = [System.IO.File]::ReadAllText($path)
          $content = $content.Replace("using System.Runtime.Remoting.Metadata.W3cXsd2001;`r`n", '')
          $content = $content.Replace("using System.Runtime.Remoting.Metadata.W3cXsd2001;`n", '')
          [System.IO.File]::WriteAllText($path, $content, [System.Text.UTF8Encoding]::new($true))

      - name: Restore
        run: dotnet restore TaikoSoundEditor.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build TaikoSoundEditor.sln --configuration Release --no-restore --verbosity minimal 2>&1 |
            Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload cleaned source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-source
          path: Commons/Controls/MusicOrderViewer.cs
